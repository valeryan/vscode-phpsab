name: Combine Dependabot PRs

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  combine-dependabot-prs:
    name: Combine Dependabot PRs into one security branch
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' || github.event_name == 'workflow_dispatch'
    env:
      BRANCH_NAME: security/bump-dependency-versions-from-dependabot
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Create security branch if it does not exist
        run: |
          git fetch origin
          if git ls-remote --exit-code origin "refs/heads/$BRANCH_NAME"; then
            echo "Branch $BRANCH_NAME already exists — resuming."
          else
            git checkout -B "$BRANCH_NAME" origin/main
            git push origin "$BRANCH_NAME"
            echo "Created branch $BRANCH_NAME from main."
          fi

      - name: Retarget and merge dependabot PRs
        run: |
          MERGED_ITEMS=()
          FAILED_ITEMS=()

          mapfile -t PR_ENTRIES < <(gh pr list \
            --base main \
            --state open \
            --limit 100 \
            --json number,title,author \
            --jq '.[] | select(.author.login == "dependabot[bot]") | "\(.number)\t\(.title)"')

          if [ ${#PR_ENTRIES[@]} -eq 0 ]; then
            echo "No open Dependabot PRs found — nothing to combine."
            exit 0
          fi

          echo "Found ${#PR_ENTRIES[@]} open Dependabot PR(s)."

          for entry in "${PR_ENTRIES[@]}"; do
            IFS=$'\t' read -r number title <<< "$entry"
            echo ""
            echo "Processing PR #${number}: ${title}"

            # Retarget this PR's base to the security branch
            if ! gh pr edit "$number" --base "$BRANCH_NAME"; then
              echo "❌ Failed to retarget PR #${number} to ${BRANCH_NAME} — skipping"
              FAILED_ITEMS+=("> * ${title} (#${number})")
              continue
            fi

            # Merge into the security branch via GitHub's server-side merge
            if gh pr merge "$number" --merge 2>&1; then
              echo "✅ Merged PR #${number}"
              MERGED_ITEMS+=("* ${title} (#${number})")
            else
              echo "❌ Failed to merge PR #${number} — retargeting back to main"
              gh pr edit "$number" --base main || echo "::warning::Could not retarget PR #${number} back to main"
              FAILED_ITEMS+=("> * ${title} (#${number})")
            fi
          done

          if [ ${#MERGED_ITEMS[@]} -eq 0 ]; then
            echo "::error::No Dependabot PRs could be merged into the security branch."
            exit 1
          fi

          # Sort lines by the trailing (#NNN) PR number, ascending.
          # Works for both "* title (#N)" and "> * title (#N)" formats.
          sort_by_pr_number() {
            awk 'match($0, /\(#([0-9]+)\)$/, a) { printf "%09d\t%s\n", a[1], $0 }' \
              | sort -k1,1 | cut -f2-
          }

          # Check for an existing open combined PR
          EXISTING=$(gh pr list \
            --head "$BRANCH_NAME" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          # When a combined PR already exists, read its body and append new items
          # to each list so older entries are preserved. Deduplicate by exact line
          # (same PR always produces the same line) then sort ascending by PR number.
          if [ -n "$EXISTING" ]; then
            EXISTING_BODY=$(gh pr view "$EXISTING" --json body --jq '.body')

            mapfile -t EXISTING_MERGED < <(echo "$EXISTING_BODY" | grep -E '^\* .+\(#[0-9]+\)$')
            mapfile -t EXISTING_FAILED < <(echo "$EXISTING_BODY" | grep -E '^> \* .+\(#[0-9]+\)$')

            ALL_MERGED=$(printf '%s\n' "${EXISTING_MERGED[@]}" "${MERGED_ITEMS[@]}" \
              | grep -v '^[[:space:]]*$' | sort_by_pr_number | uniq)
            ALL_FAILED=$(printf '%s\n' "${EXISTING_FAILED[@]}" "${FAILED_ITEMS[@]}" \
              | grep -v '^[[:space:]]*$' | sort_by_pr_number | uniq)
          else
            ALL_MERGED=$(printf '%s\n' "${MERGED_ITEMS[@]}" | sort_by_pr_number)
            ALL_FAILED=$(printf '%s\n' "${FAILED_ITEMS[@]}" | sort_by_pr_number)
          fi

          # Build the combined PR body
          BODY_FILE=$(mktemp)
          {
            echo "This pull request updates dependency versions to ensure compatibility and address potential bug fixes and security vulnerabilities."
            echo ""
            echo "Dependency updates:"
            echo ""
            echo "$ALL_MERGED"
            if [ -n "$ALL_FAILED" ]; then
              echo ""
              echo "> ⚠️ The following PRs could not be automatically combined and require manual attention:"
              echo "$ALL_FAILED"
            fi
          } > "$BODY_FILE"

          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" \
              --title "Security - bump dependency versions from dependabot" \
              --body-file "$BODY_FILE" \
              --add-assignee yCodeTech
            echo "✅ Updated existing combined PR #${EXISTING}"
          else
            gh pr create \
              --head "$BRANCH_NAME" \
              --base main \
              --title "Security - bump dependency versions from dependabot" \
              --body-file "$BODY_FILE" \
              --assignee yCodeTech \
              --label dependencies \
              --label javascript \
              --label security
            echo "✅ Created new combined PR"
          fi

          rm -f "$BODY_FILE"
