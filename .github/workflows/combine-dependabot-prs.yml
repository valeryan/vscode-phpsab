name: Combine Dependabot PRs

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  combine-dependabot-prs:
    name: Combine Dependabot PRs into one security branch
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' || github.event_name == 'workflow_dispatch'
    env:
      BRANCH_NAME: security/bump-dependency-versions-from-dependabot
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Create or update security branch
        run: |
          git fetch origin
          if git ls-remote --exit-code origin "refs/heads/$BRANCH_NAME"; then
            echo "Branch $BRANCH_NAME already exists — checking whether it needs updates from main."
            git checkout -b "$BRANCH_NAME" "origin/$BRANCH_NAME"
            if git merge-base --is-ancestor origin/main HEAD; then
              echo "Branch $BRANCH_NAME already includes origin/main — no update needed."
            else
              echo "Branch $BRANCH_NAME is behind origin/main — merging updates."
              if ! git merge origin/main --no-edit; then
                echo "::error::Merge conflict between $BRANCH_NAME and main — manual intervention required."
                git merge --abort
                exit 1
              fi
              git push origin "$BRANCH_NAME"
              echo "Updated branch $BRANCH_NAME from main."
            fi
          else
            git checkout -B "$BRANCH_NAME" origin/main
            git push origin "$BRANCH_NAME"
            echo "Created branch $BRANCH_NAME from main."
          fi

      - name: Retarget and merge dependabot PRs
        id: merge-prs
        run: |
          MERGED_ITEMS=()
          FAILED_ITEMS=()

          mapfile -t PR_ENTRIES < <(gh pr list \
            --author "app/dependabot" \
            --state open \
            --limit 100 \
            --json number,title \
            --jq '.[] | "\(.number)\t\(.title)"')

          if [ ${#PR_ENTRIES[@]} -eq 0 ]; then
            echo "No open Dependabot PRs found — nothing to combine."
            echo "has_merges=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found ${#PR_ENTRIES[@]} open Dependabot PR(s)."

          for entry in "${PR_ENTRIES[@]}"; do
            IFS=$'\t' read -r number title <<< "$entry"
            echo ""
            echo "Processing PR #${number}: ${title}"

            # Retarget this PR's base to the security branch
            if ! gh pr edit "$number" --base "$BRANCH_NAME"; then
              echo "❌ Failed to retarget PR #${number} to ${BRANCH_NAME} — skipping"
              FAILED_ITEMS+=("> * ${title} (#${number})")
              continue
            fi

            # Merge into the security branch via GitHub's server-side merge
            if gh pr merge "$number" --squash 2>&1; then
              echo "✅ Merged PR #${number}"
              MERGED_ITEMS+=("* ${title} (#${number})")
            else
              echo "❌ Failed to merge PR #${number} — retargeting back to main"
              gh pr edit "$number" --base main || echo "::warning::Could not retarget PR #${number} back to main"
              FAILED_ITEMS+=("> * ${title} (#${number})")
            fi
          done

          if [ ${#MERGED_ITEMS[@]} -eq 0 ]; then
            echo "::error::No Dependabot PRs could be merged into the security branch."
            exit 1
          fi

          # Write merged/failed items to temp files for use in the next step
          printf '%s\n' "${MERGED_ITEMS[@]}" > "$RUNNER_TEMP/merged_items.txt"
          printf '%s\n' "${FAILED_ITEMS[@]}" > "$RUNNER_TEMP/failed_items.txt"
          echo "has_merges=true" >> "$GITHUB_OUTPUT"

      - name: Build and update security PR description
        if: steps.merge-prs.outputs.has_merges == 'true'
        run: |
          mapfile -t MERGED_ITEMS < "$RUNNER_TEMP/merged_items.txt"
          mapfile -t FAILED_ITEMS < "$RUNNER_TEMP/failed_items.txt"

          # Check for an existing open combined PR
          EXISTING=$(gh pr list \
            --head "$BRANCH_NAME" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          # When a combined PR already exists, read its body and append new items
          # to each list so older entries are preserved. Deduplicate by exact line
          # (same PR always produces the same line) while preserving processing order.
          if [ -n "$EXISTING" ]; then
            # Strip carriage returns so grep patterns match correctly regardless of
            # the line endings returned by the GitHub API.
            EXISTING_BODY=$(gh pr view "$EXISTING" --json body --jq '.body' | tr -d '\r')

            mapfile -t EXISTING_MERGED < <(echo "$EXISTING_BODY" | grep -E '^\* .+\(#[0-9]+\)$' || true)
            mapfile -t EXISTING_FAILED < <(echo "$EXISTING_BODY" | grep -E '^> \* .+\(#[0-9]+\)$' || true)

            ALL_MERGED=$(printf '%s\n' "${EXISTING_MERGED[@]}" "${MERGED_ITEMS[@]}" \
              | grep -v '^[[:space:]]*$' | awk '!seen[$0]++')
            if [ ${#EXISTING_FAILED[@]} -gt 0 ] || [ ${#FAILED_ITEMS[@]} -gt 0 ]; then
              ALL_FAILED=$(printf '%s\n' "${EXISTING_FAILED[@]}" "${FAILED_ITEMS[@]}" \
                | grep -v '^[[:space:]]*$' | awk '!seen[$0]++')
            fi
          else
            ALL_MERGED=$(printf '%s\n' "${MERGED_ITEMS[@]}")
            ALL_FAILED=$(printf '%s\n' "${FAILED_ITEMS[@]}")
          fi

          # Build the combined PR body
          BODY_FILE=$(mktemp)
          {
            echo "This pull request updates dependency versions to ensure compatibility and address potential bug fixes and security vulnerabilities."
            echo ""
            echo "Dependency updates:"
            echo ""
            echo "$ALL_MERGED"
            if [ -n "$ALL_FAILED" ]; then
              echo ""
              echo "> ⚠️ The following PRs could not be automatically combined and require manual attention:"
              echo "$ALL_FAILED"
            fi
          } > "$BODY_FILE"

          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" \
              --title "Security - bump dependency versions from dependabot" \
              --body-file "$BODY_FILE" \
              --add-assignee yCodeTech
            echo "✅ Updated existing combined PR #${EXISTING}"
          else
            gh pr create \
              --head "$BRANCH_NAME" \
              --base main \
              --title "Security - bump dependency versions from dependabot" \
              --body-file "$BODY_FILE" \
              --assignee yCodeTech \
              --label dependencies \
              --label javascript \
              --label security
            echo "✅ Created new combined PR"
          fi

          rm -f "$BODY_FILE"
